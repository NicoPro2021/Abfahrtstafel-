<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DB Monitor Pro | Live FIA</title>
    <style>
        :root {
            --fia-blue: #0000cc;
            --fia-white: #ffffff;
            --db-red: #e2001a;
            --db-dark: #111111;
            --ontime-green: #008754;
            --delay-red: #d50000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #000; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow: hidden; 
            color: var(--fia-white);
        }

        /* Navbar */
        .db-navbar {
            background: #fff;
            padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid var(--db-red);
            color: #000;
        }
        .db-logo { background: var(--db-red); color: white; font-weight: 900; padding: 4px 10px; border-radius: 2px; }

        /* Welcome Screen */
        #welcome-screen { 
            position: fixed; inset: 0; background: #f4f7f9; z-index: 3000; 
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            overflow-y: auto; color: #333;
        }
        #welcome-screen.hidden { display: none; }
        .search-box { background: #fff; padding: 20px; border-radius: 12px; width: 92%; max-width: 600px; border: 1px solid #ccc; cursor: pointer; text-align: center; font-weight: bold; }
        .fav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 92%; max-width: 600px; margin-top: 20px; }
        .fav-item { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee; cursor: pointer; text-align: center; }

        /* Monitor / FIA Look */
        .monitor { display: none; flex-direction: column; height: 100%; background: var(--fia-blue); }
        .monitor.active { display: flex; }

        .station-header { 
            padding: 15px 25px; border-bottom: 3px solid rgba(255,255,255,0.3); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .station-name { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0; }

        #board { flex: 1; overflow-y: auto; }

        .departure-row { 
            display: grid; grid-template-columns: 220px 1fr 100px; 
            padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.2); 
            align-items: center; position: relative;
        }

        /* Zeit-Sektion */
        .time-container { display: flex; flex-direction: column; }
        .line-id { font-size: 1.2rem; font-weight: bold; opacity: 0.8; margin-bottom: 5px; }
        .time-wrapper { display: flex; align-items: center; gap: 10px; }
        .plan-time { font-size: 2.8rem; font-weight: 800; line-height: 1; }
        .delay-box { background: #fff; color: var(--fia-blue); padding: 2px 8px; font-size: 1.8rem; font-weight: 900; border-radius: 3px; }

        /* Mitte */
        .dest-box { padding-left: 20px; }
        .via-info { font-size: 1rem; opacity: 0.8; margin-bottom: 5px; min-height: 1.2rem; }
        .destination { font-size: 3rem; font-weight: 800; letter-spacing: -1px; line-height: 1; }

        /* Gleis */
        .track-box { text-align: right; font-size: 4rem; font-weight: 900; }

        /* Blink-Punkt (Weißer Punkt 3 Min vor Abfahrt) */
        .depart-point {
            width: 14px; height: 14px; background: #fff; border-radius: 50%;
            position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
            animation: fia-blink 1.2s infinite;
        }
        @keyframes fia-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Fullscreen Modus Skalierung */
        :fullscreen .departure-row { grid-template-columns: 450px 1fr 180px; padding: 40px 60px; min-height: 200px; }
        :fullscreen .plan-time { font-size: 7rem; }
        :fullscreen .delay-box { font-size: 4.5rem; }
        :fullscreen .destination { font-size: 8rem; }
        :fullscreen .track-box { font-size: 10rem; }
        :fullscreen .station-name { font-size: 4rem; }

        /* Search Overlay */
        #search-overlay { position: fixed; inset: 0; background: #fff; z-index: 4000; display: none; flex-direction: column; color: #000; }
        .search-nav { padding: 15px; background: var(--db-dark); display: flex; gap: 15px; }
    </style>
</head>
<body>

<div class="db-navbar">
    <div class="db-logo">DB</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div id="clock" style="font-weight: 900; font-size: 1.2rem;">00:00</div>
        <button onclick="toggleFullscreen()" style="padding: 5px 10px; cursor:pointer;">VOLLBILD</button>
    </div>
</div>

<div id="welcome-screen">
    <div class="search-box" onclick="openSearch()">🔍 BAHNHOF SUCHEN...</div>
    <div class="fav-grid" id="fav-bar"></div>
</div>

<div id="search-overlay">
    <div class="search-nav">
        <button onclick="closeSearch()" style="color:white; background:none; border:none; font-size:1.8rem;">✕</button>
        <input type="text" id="station-query" placeholder="Bahnhof Name..." oninput="filterStations()" style="flex:1; padding:10px; font-size:1.2rem;">
    </div>
    <div id="search-results" style="overflow-y: auto;"></div>
</div>

<div class="monitor" id="monitor-app">
    <div class="station-header">
        <h1 id="display-station" class="station-name">STATION</h1>
        <button onclick="goHome()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 15px; cursor:pointer;">HOME</button>
    </div>
    <div id="board"></div>
</div>

<script>
    const STATIONS_DB = [
        { name: "Bad Belzig", file: "bad_belzig.json" }, { name: "Berlin Hbf", file: "berlin_hbf.json" },
        { name: "Biederitz", file: "biederitz.json" }, { name: "Bitterfeld", file: "bitterfeld.json" },
        { name: "Brandenburg Hbf", file: "brandenburg_hbf.json" }, { name: "Dessau Hbf", file: "dessau_hbf.json" },
        { name: "Dessau Süd", file: "dessau_sued.json" }, { name: "Gommern", file: "gommern.json" },
        { name: "Güterglück", file: "gueterglueck.json" }, { name: "Leipzig Hbf", file: "leipzig_hbf.json" },
        { name: "Leipzig Hbf (tief)", file: "leipzig_hbf_tief.json" }, { name: "Magdeburg Hbf", file: "magdeburg_hbf.json" },
        { name: "Magdeburg Herrenkrug", file: "magdeburg_herrenkrug.json" }, { name: "Magdeburg Neustadt", file: "magdeburg_neustadt.json" },
        { name: "Pretzier (Altm)", file: "pretzier_altm.json" }, { name: "Rodleben", file: "rodleben.json" },
        { name: "Roßlau (Elbe)", file: "rosslau.json" }, { name: "Wolfen", file: "wolfen.json" },
        { name: "Wusterwitz", file: "wusterwitz.json" }, { name: "Zerbst/Anhalt", file: "zerbst.json" }
    ].sort((a, b) => a.name.localeCompare(b.name));

    const BASE_URL = 'https://raw.githubusercontent.com/nicopro2021/Abfahrtstafel-/main/';
    let currentStation = null;
    let favorites = JSON.parse(localStorage.getItem('db_monitor_favs')) || [null, null, null, null];

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('station-query').focus(); filterStations(); }
    function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; }
    function goHome() { document.getElementById('welcome-screen').classList.remove('hidden'); document.getElementById('monitor-app').classList.remove('active'); updateFavUI(); }

    function selectStation(station) {
        currentStation = station;
        document.getElementById('display-station').innerText = station.name.toUpperCase();
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('monitor-app').classList.add('active');
        closeSearch(); loadData();
    }

    function filterStations() {
        const q = document.getElementById('station-query').value.toLowerCase();
        document.getElementById('search-results').innerHTML = STATIONS_DB.filter(s => s.name.toLowerCase().includes(q))
            .map(s => `<div style="padding:15px; border-bottom:1px solid #eee; cursor:pointer;" onclick='selectStation(${JSON.stringify(s)})'>${s.name}</div>`).join('');
    }

    async function loadData() {
        if(!currentStation) return;
        try {
            const res = await fetch(`${BASE_URL}${currentStation.file}?t=${Date.now()}`);
            const data = await res.json();
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const jetzt = new Date();
            const aktuelleSek = (jetzt.getHours() * 3600) + (jetzt.getMinutes() * 60) + jetzt.getSeconds();

            data.forEach(zug => {
                const [h, m] = zug.echte_zeit.split(':').map(Number);
                const echteSek = (h * 3600) + (m * 60);

                // FILTER: Zug bleibt bis 120 Sek nach der ECHTEN Abfahrt sichtbar
                if (echteSek < aktuelleSek - 120) return;

                const isDelayed = zug.echte_zeit !== zug.zeit;
                const isAboutToDepart = (echteSek - aktuelleSek) <= 180 && (echteSek - aktuelleSek) >= 0;

                board.innerHTML += `
                    <div class="departure-row">
                        ${isAboutToDepart ? '<div class="depart-point"></div>' : ''}
                        <div class="time-box">
                            <span class="line-id">${zug.linie}</span>
                            <div class="time-wrapper">
                                <span class="plan-time">${zug.zeit}</span>
                                ${isDelayed ? `<div class="delay-box">${zug.echte_zeit}</div>` : ''}
                            </div>
                        </div>
                        <div class="dest-box">
                            <div class="via-info">${zug.begruendung || ''}</div>
                            <div class="destination">${zug.ziel}</div>
                        </div>
                        <div class="track-box">${zug.gleis || ''}</div>
                    </div>`;
            });
        } catch (e) { console.error(e); }
    }

    function updateFavUI() {
        document.getElementById('fav-bar').innerHTML = favorites.map((f, i) => `
            <div class="fav-item" onclick="fClick(${i})">${f ? f.name : 'PLATZ '+(i+1)}</div>`).join('');
    }
    function fClick(i) { if(favorites[i]) selectStation(favorites[i]); else openSearch(); }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);
    setInterval(loadData, 20000);
    updateFavUI();
</script>
</body>
</html>
