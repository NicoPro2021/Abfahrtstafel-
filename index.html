<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DB Monitor Pro | FIA Live</title>
    <style>
        :root {
            --fia-blue: #0000cc;
            --fia-white: #ffffff;
            --db-red: #e2001a;
            --db-dark: #111111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #000; 
            font-family: Arial, sans-serif; 
            overflow: hidden; 
        }

        /* Navbar */
        .db-navbar {
            background: #fff;
            padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid var(--db-red);
        }
        :fullscreen .db-navbar { display: none; }

        /* Welcome Screen */
        #welcome-screen { 
            position: fixed; inset: 0; background: #f4f7f9; z-index: 3000; 
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            overflow-y: auto; color: #111;
        }
        #welcome-screen.hidden { display: none; }

        .search-box { 
            background: #fff; padding: 20px; border-radius: 12px; 
            width: 92%; max-width: 600px; border: 1px solid #ddd; 
            margin: 20px 0; cursor: pointer; text-align: center; font-weight: bold;
        }

        .fav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 92%; max-width: 600px; }
        .fav-item { 
            background: #fff; padding: 18px; border-radius: 12px; text-align: center; 
            cursor: pointer; font-weight: bold; border: 1px solid #eee;
        }

        /* Monitor Design */
        .monitor { display: none; flex-direction: column; height: 100%; background: var(--fia-blue); color: #fff; }
        .monitor.active { display: flex; }

        .fia-header { 
            padding: 1vh 2vw; background: var(--fia-blue); 
            border-bottom: 2px solid rgba(255,255,255,0.4);
            display: flex; justify-content: space-between; align-items: center;
        }
        .station-name { font-size: 2vw; font-weight: bold; text-transform: uppercase; margin: 0; }

        #board { flex: 1; overflow-y: auto; }

        /* Fixiertes Spalten-Layout */
        .departure-row { 
            display: grid; 
            grid-template-columns: 22% 63% 15%; 
            padding: 2vh 2vw; 
            border-bottom: 1.5px solid rgba(255,255,255,0.25); 
            align-items: center; 
            position: relative;
            min-height: 12vh;
        }

        /* Zeit-Sektion: Jetzt untereinander gestapelt */
        .time-box { display: flex; flex-direction: column; justify-content: center; }
        .line-id { font-size: 1.5vw; font-weight: bold; opacity: 0.8; margin-bottom: 2px; }
        .time-wrapper { display: flex; flex-direction: column; align-items: flex-start; }
        
        .plan-time { font-size: 4.5vw; font-weight: bold; line-height: 1; }
        
        .delay-box { 
            background: #fff; color: var(--fia-blue); 
            padding: 1px 6px; margin-top: 4px;
            font-size: 2.5vw; font-weight: bold; border-radius: 3px;
            /* Kein Blinken mehr */
        }

        /* Blink-Punkt (Abfahrt in Kürze) */
        .depart-point {
            width: 1vw; height: 1vw; background: #fff; border-radius: 50%;
            position: absolute; left: 0.6vw; top: 50%; transform: translateY(-50%);
            animation: fia-blink 1.2s infinite;
        }
        @keyframes fia-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Ziel-Sektion */
        .dest-box { overflow: hidden; padding-right: 15px; }
        .destination { 
            font-size: 5.8vw; font-weight: bold; letter-spacing: -1px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Gleis-Sektion */
        .track-box { text-align: right; font-size: 7vw; font-weight: bold; }

        /* Vollbild-Größen */
        :fullscreen .departure-row { min-height: 18vh; }
        :fullscreen .station-name { font-size: 3.5vw; }
        :fullscreen .plan-time { font-size: 7.5vw; }
        :fullscreen .destination { font-size: 9.5vw; }
        :fullscreen .track-box { font-size: 11vw; }
        :fullscreen .delay-box { font-size: 4vw; }

        /* Search Overlay */
        #search-overlay { position: fixed; inset: 0; background: #fff; z-index: 4000; display: none; flex-direction: column; }
        .search-nav { padding: 15px; background: var(--db-dark); display: flex; gap: 15px; }
        .search-input { flex: 1; border: none; padding: 14px; border-radius: 8px; font-size: 1.2rem; outline: none; }
    </style>
</head>
<body>

<div class="db-navbar">
    <div style="font-weight: 900; background: var(--db-red); color: #fff; padding: 4px 10px; border-radius: 4px;">DB</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <div id="clock" style="font-weight: 900; font-size: 1.3rem;">00:00</div>
        <button onclick="toggleFullscreen()" style="padding: 6px 15px; cursor:pointer; font-weight: bold; border: 2px solid #333; background: #fff;">VOLLBILD</button>
    </div>
</div>

<div id="welcome-screen">
    <div style="margin: 30px 0; font-weight: 900; font-size: 1.8rem;">DB MONITOR <span style="color:var(--db-red)">PRO</span></div>
    <div class="search-box" onclick="openSearch()">🔍 BAHNHOF SUCHEN...</div>
    <div style="width: 92%; max-width: 600px; margin: 20px 0 10px; font-weight: 800; color: #666; font-size: 0.8rem; text-transform: uppercase;">Favoriten</div>
    <div class="fav-grid" id="fav-bar"></div>
</div>

<div id="search-overlay">
    <div class="search-nav">
        <button onclick="closeSearch()" style="color:white; background:none; border:none; font-size:2rem; cursor:pointer;">✕</button>
        <input type="text" id="station-query" class="search-input" placeholder="Bahnhof eingeben..." oninput="filterStations()">
    </div>
    <div id="search-results" style="overflow-y: auto;"></div>
</div>

<div class="monitor" id="monitor-app">
    <div class="fia-header">
        <h1 id="display-station" class="station-name">MAGDEBURG HBF</h1>
        <div style="display: flex; gap: 10px;">
            <button id="star-btn" onclick="toggleFavorite()" style="background:none; border:1.5px solid #fff; color:#fff; padding:6px 15px; cursor:pointer; font-weight:bold; border-radius:4px;">★ FAV</button>
            <button onclick="goHome()" style="background:#fff; border:none; color:var(--fia-blue); padding:6px 15px; cursor:pointer; font-weight:bold; border-radius:4px;">HOME</button>
        </div>
    </div>
    <div id="board"></div>
</div>

<script>
    const STATIONS_DB = [
        { name: "Bad Belzig", file: "bad_belzig.json" }, { name: "Berlin Hbf", file: "berlin_hbf.json" },
        { name: "Biederitz", file: "biederitz.json" }, { name: "Bitterfeld", file: "bitterfeld.json" },
        { name: "Brandenburg Hbf", file: "brandenburg_hbf.json" }, { name: "Dessau Hbf", file: "dessau_hbf.json" },
        { name: "Dessau Süd", file: "dessau_sued.json" }, { name: "Gommern", file: "gommern.json" },
        { name: "Güterglück", file: "gueterglueck.json" }, { name: "Leipzig Hbf", file: "leipzig_hbf.json" },
        { name: "Leipzig Hbf (tief)", file: "leipzig_hbf_tief.json" }, { name: "Magdeburg Hbf", file: "magdeburg_hbf.json" },
        { name: "Magdeburg Herrenkrug", file: "magdeburg_herrenkrug.json" }, { name: "Magdeburg Neustadt", file: "magdeburg_neustadt.json" },
        { name: "Pretzier (Altm)", file: "pretzier_altm.json" }, { name: "Rodleben", file: "rodleben.json" },
        { name: "Roßlau (Elbe)", file: "rosslau.json" }, { name: "Wolfen", file: "wolfen.json" },
        { name: "Wusterwitz", file: "wusterwitz.json" }, { name: "Zerbst/Anhalt", file: "zerbst.json" }
    ].sort((a, b) => a.name.localeCompare(b.name));

    const BASE_URL = 'https://raw.githubusercontent.com/nicopro2021/Abfahrtstafel-/main/';
    let currentStation = null;
    let favorites = JSON.parse(localStorage.getItem('db_monitor_favs')) || [null, null, null, null];

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('station-query').focus(); filterStations(); }
    function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; }
    function goHome() { 
        document.getElementById('welcome-screen').classList.remove('hidden'); 
        document.getElementById('monitor-app').classList.remove('active'); 
        updateFavUI(); 
    }

    function selectStation(station) {
        currentStation = station;
        document.getElementById('display-station').innerText = station.name.toUpperCase();
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('monitor-app').classList.add('active');
        closeSearch(); updateStar(); loadData();
    }

    function filterStations() {
        const q = document.getElementById('station-query').value.toLowerCase();
        document.getElementById('search-results').innerHTML = STATIONS_DB.filter(s => s.name.toLowerCase().includes(q))
            .map(s => `<div style="padding:20px; border-bottom:1px solid #eee; cursor:pointer; font-weight:bold; color:#111;" onclick='selectStation(${JSON.stringify(s)})'>${s.name}</div>`).join('');
    }

    async function loadData() {
        if(!currentStation) return;
        try {
            const res = await fetch(`${BASE_URL}${currentStation.file}?t=${Date.now()}`);
            const data = await res.json();
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const jetzt = new Date();
            const aktuelleSek = (jetzt.getHours() * 3600) + (jetzt.getMinutes() * 60) + jetzt.getSeconds();

            data.forEach(zug => {
                const [h, m] = zug.echte_zeit.split(':').map(Number);
                const echteSek = (h * 3600) + (m * 60);

                if (echteSek < aktuelleSek - 60) return;

                const isDelayed = zug.echte_zeit !== zug.zeit;
                const isAboutToDepart = (echteSek - aktuelleSek) <= 180 && (echteSek - aktuelleSek) >= 0;

                board.innerHTML += `
                    <div class="departure-row">
                        ${isAboutToDepart ? '<div class="depart-point"></div>' : ''}
                        <div class="time-box">
                            <span class="line-id">${zug.linie}</span>
                            <div class="time-wrapper">
                                <span class="plan-time">${zug.zeit}</span>
                                ${isDelayed ? `<div class="delay-box">${zug.echte_zeit}</div>` : ''}
                            </div>
                        </div>
                        <div class="dest-box">
                            <div class="destination">${zug.ziel}</div>
                        </div>
                        <div class="track-box">${zug.gleis || ''}</div>
                    </div>`;
            });
        } catch (e) { console.error("Datenfehler"); }
    }

    function toggleFavorite() {
        const idx = favorites.findIndex(f => f && f.file === currentStation.file);
        if (idx > -1) favorites[idx] = null;
        else { const empty = favorites.indexOf(null); if (empty > -1) favorites[empty] = currentStation; else favorites[0] = currentStation; }
        localStorage.setItem('db_monitor_favs', JSON.stringify(favorites));
        updateStar();
    }

    function updateStar() {
        const isFav = currentStation && favorites.some(f => f && f.file === currentStation.file);
        document.getElementById('star-btn').style.background = isFav ? '#ffcc00' : 'none';
        document.getElementById('star-btn').style.color = isFav ? '#000' : '#fff';
    }

    function updateFavUI() {
        document.getElementById('fav-bar').innerHTML = favorites.map((f, i) => `
            <div class="fav-item" onclick="fClick(${i})">${f ? f.name : '— LEER —'}</div>`).join('');
    }
    
    function fClick(i) { if(favorites[i]) selectStation(favorites[i]); else openSearch(); }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);
    setInterval(loadData, 15000);
    updateFavUI();
</script>
</body>
</html>
