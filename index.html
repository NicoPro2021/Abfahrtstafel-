<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DB Abfahrten | Wartehalle</title>
    <style>
        :root {
            /* Das typische DB-Monitor-Blau und das leuchtende Gelb */
            --monitor-bg: #000033; 
            --monitor-yellow: #ffcc00; 
            --monitor-white: #ffffff;
            --db-red: #e2001a;
        }

        * { box-sizing: border-box; }

        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #000; /* Schwarzer Rand wie beim Gehäuse */
            font-family: "Lucida Console", Monaco, monospace; /* Monospace-Look für Digital-Feeling */
            overflow: hidden; 
        }

        /* Navbar */
        .db-navbar {
            background: #1a1a1a;
            padding: 8px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #333;
        }

        .db-logo { background: var(--db-red); color: white; font-weight: bold; padding: 3px 8px; border-radius: 2px; }

        .fs-btn {
            background: #333; color: #ccc; border: 1px solid #555;
            padding: 5px 10px; font-size: 0.7rem; cursor: pointer;
        }

        /* Monitor Gehäuse */
        .monitor-frame {
            height: calc(100vh - 45px);
            background: var(--monitor-bg);
            border: 10px solid #222; /* Dicker Rahmen wie beim echten Monitor */
            display: flex;
            flex-direction: column;
            color: var(--monitor-yellow);
            text-transform: uppercase;
        }

        .monitor-header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid var(--monitor-yellow);
        }

        .station-name { font-size: 1.5rem; font-weight: bold; }
        .clock { font-size: 1.5rem; font-weight: bold; color: var(--monitor-white); }

        /* Abfahrtstafel */
        #board { flex: 1; overflow-y: auto; }

        .departure-row {
            display: grid;
            grid-template-columns: 120px 1fr 100px;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 204, 0, 0.3);
            align-items: center;
        }

        .time-col { font-size: 1.6rem; font-weight: bold; }
        .train-dest-col { padding: 0 15px; }
        .train-line { font-size: 0.9rem; color: var(--monitor-white); margin-bottom: 2px; }
        .train-dest { font-size: 1.8rem; font-weight: bold; letter-spacing: 1px; }
        .track-col { text-align: right; font-size: 2.2rem; font-weight: bold; }

        /* Status (Verspätung) */
        .delay-info { 
            color: var(--monitor-white); 
            font-size: 0.8rem; 
            margin-top: 4px;
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 2px 5px;
        }

        /* FULLSCREEN MODUS */
        :fullscreen .monitor-frame { border: none; height: 100vh; }
        :fullscreen .departure-row { padding: 30px 40px; grid-template-columns: 250px 1fr 150px; }
        :fullscreen .time-col { font-size: 4rem; }
        :fullscreen .train-dest { font-size: 4.5rem; }
        :fullscreen .train-line { font-size: 1.8rem; }
        :fullscreen .track-col { font-size: 6rem; }
        :fullscreen .station-name, :fullscreen .clock { font-size: 3rem; }

        /* Welcome & Search Overlay */
        #welcome { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-start { background: var(--db-red); color: white; padding: 20px 40px; border: none; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
        #search-overlay { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; padding: 20px; }
        .search-input { width: 100%; padding: 15px; font-size: 1.5rem; background: #111; color: var(--monitor-yellow); border: 2px solid var(--monitor-yellow); }
    </style>
</head>
<body>

<div class="db-navbar">
    <div class="db-logo">DB</div>
    <button class="fs-btn" onclick="toggleFullscreen()">Vollbild aktivieren</button>
</div>

<div id="welcome">
    <button class="btn-start" onclick="openSearch()">BAHNHOF WÄHLEN</button>
</div>

<div class="monitor-frame">
    <div class="monitor-header">
        <div class="station-name" id="display-station">Bitte wählen...</div>
        <div class="clock" id="clock">00:00</div>
    </div>
    
    <div id="board">
        </div>
</div>

<div id="search-overlay">
    <input type="text" class="search-input" id="station-query" placeholder="Name eingeben..." oninput="filterStations()">
    <div id="search-results" style="margin-top: 20px; color: white;"></div>
    <button onclick="closeSearch()" style="margin-top: 20px; color: #ffcc00; background: none; border: 1px solid #ffcc00; padding: 10px; cursor: pointer;">Abbrechen</button>
</div>

<script>
    const STATIONS_DB = [
        { name: "Bad Belzig", file: "bad_belzig.json" }, { name: "Berlin Hbf", file: "berlin_hbf.json" },
        { name: "Biederitz", file: "biederitz.json" }, { name: "Bitterfeld", file: "bitterfeld.json" },
        { name: "Brandenburg Hbf", file: "brandenburg_hbf.json" }, { name: "Dessau Hbf", file: "dessau_hbf.json" },
        { name: "Dessau Süd", file: "dessau_sued.json" }, { name: "Gommern", file: "gommern.json" },
        { name: "Güterglück", file: "gueterglueck.json" }, { name: "Leipzig Hbf", file: "leipzig_hbf.json" },
        { name: "Leipzig Hbf (tief)", file: "leipzig_hbf_tief.json" }, { name: "Magdeburg Hbf", file: "magdeburg_hbf.json" },
        { name: "Magdeburg Herrenkrug", file: "magdeburg_herrenkrug.json" }, { name: "Magdeburg Neustadt", file: "magdeburg_neustadt.json" },
        { name: "Pretzier (Altm)", file: "pretzier_altm.json" }, { name: "Rodleben", file: "rodleben.json" },
        { name: "Roßlau (Elbe)", file: "rosslau.json" }, { name: "Wolfen", file: "wolfen.json" },
        { name: "Wusterwitz", file: "wusterwitz.json" }, { name: "Zerbst/Anhalt", file: "zerbst.json" }
    ];

    const BASE_URL = 'https://raw.githubusercontent.com/nicopro2021/Abfahrtstafel-/main/';
    let currentStation = null;

    function toggleFullscreen() {
        const doc = document.documentElement;
        if (!document.fullscreenElement) doc.requestFullscreen();
        else document.exitFullscreen();
    }

    function openSearch() { document.getElementById('search-overlay').style.display = 'block'; document.getElementById('station-query').focus(); }
    function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; }

    function selectStation(station) {
        currentStation = station;
        document.getElementById('display-station').innerText = station.name;
        document.getElementById('welcome').style.display = 'none';
        closeSearch();
        loadData();
    }

    function filterStations() {
        const q = document.getElementById('station-query').value.toLowerCase();
        document.getElementById('search-results').innerHTML = STATIONS_DB.filter(s => s.name.toLowerCase().includes(q))
            .map(s => `<div onclick='selectStation(${JSON.stringify(s)})' style="padding:15px; border-bottom:1px solid #333; cursor:pointer;">${s.name}</div>`).join('');
    }

    async function loadData() {
        if(!currentStation) return;
        try {
            const res = await fetch(`${BASE_URL}${currentStation.file}?t=${Date.now()}`);
            const data = await res.json();
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            data.forEach(zug => {
                const isDelayed = zug.echte_zeit !== zug.zeit;
                board.innerHTML += `
                    <div class="departure-row">
                        <div class="time-col">
                            ${zug.echte_zeit}
                        </div>
                        <div class="train-dest-col">
                            <div class="train-line">${zug.linie}</div>
                            <div class="train-dest">${zug.ziel}</div>
                            ${isDelayed ? `<div class="delay-info">HEUTE ETWAS SPÄTER (PLAN: ${zug.zeit})</div>` : ''}
                        </div>
                        <div class="track-col">${zug.gleis || ''}</div>
                    </div>`;
            });
        } catch (e) { console.error("Fehler"); }
    }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);

    setInterval(loadData, 30000);
</script>
</body>
</html>
