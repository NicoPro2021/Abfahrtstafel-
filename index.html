<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DB FIA Monitor | Live</title>
    <style>
        :root {
            --fia-blue: #0000cc;
            --fia-white: #ffffff;
            --fia-delay-bg: #ffffff;
            --fia-delay-text: #0000cc;
            --db-red: #e2001a;
        }

        * { box-sizing: border-box; }

        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #000; 
            font-family: Arial, Helvetica, sans-serif; 
            overflow: hidden; 
        }

        .db-navbar {
            background: #222; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 2px solid var(--db-red);
        }
        .db-logo { background: var(--db-red); color: white; font-weight: bold; padding: 4px 10px; border-radius: 2px; }

        .fia-container {
            height: calc(100vh - 55px);
            background: var(--fia-blue);
            color: var(--fia-white);
            display: flex;
            flex-direction: column;
        }

        .fia-header {
            padding: 10px 25px;
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        .station-name { font-size: 1.8rem; font-weight: bold; text-transform: uppercase; }
        .clock { font-size: 2.2rem; font-weight: bold; }

        #board { flex: 1; overflow-y: auto; }

        .departure-row {
            display: grid;
            grid-template-columns: 220px 1fr 100px; /* Breite Spalten für Zeit */
            padding: 20px 25px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            position: relative;
            min-height: 120px; /* Mindesthöhe gegen Überschneidung */
        }

        /* Links: Linie & Zeit */
        .time-box { display: flex; flex-direction: column; justify-content: center; }
        .line-id { font-size: 1.3rem; font-weight: bold; margin-bottom: 5px; color: rgba(255,255,255,0.9); }
        .time-wrapper { display: flex; align-items: center; gap: 12px; }
        .plan-time { font-size: 3.2rem; font-weight: bold; line-height: 1; }
        
        .delay-box { 
            background: var(--fia-delay-bg); 
            color: var(--fia-delay-text); 
            padding: 2px 10px; 
            font-size: 1.8rem; 
            font-weight: bold; 
            border-radius: 3px;
        }

        /* Mitte: Via & Ziel */
        .dest-box { 
            padding-left: 30px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            overflow: hidden;
        }
        .via-stations { 
            font-size: 1.2rem; 
            margin-bottom: 8px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            color: rgba(255,255,255,0.8);
        }
        .destination { 
            font-size: 3.5rem; 
            font-weight: bold; 
            letter-spacing: -1px; 
            line-height: 1;
        }

        /* Rechts: Gleis */
        .track-box { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            font-size: 4rem; 
            font-weight: bold; 
        }

        /* Blink-Punkt */
        .blink-dot {
            width: 15px; height: 15px; background: white; border-radius: 50%;
            position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
            animation: fia-blink 1.2s infinite;
        }
        @keyframes fia-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* FULLSCREEN OPTIMIERUNG */
        :fullscreen .departure-row { 
            grid-template-columns: 450px 1fr 200px; 
            padding: 40px 60px;
            min-height: 200px; 
        }
        :fullscreen .plan-time { font-size: 7rem; }
        :fullscreen .delay-box { font-size: 4.5rem; }
        :fullscreen .destination { font-size: 8rem; }
        :fullscreen .track-box { font-size: 10rem; }
        :fullscreen .line-id { font-size: 2.5rem; }
        :fullscreen .via-stations { font-size: 2.5rem; margin-bottom: 15px; }
        :fullscreen .station-name { font-size: 4rem; }
        :fullscreen .clock { font-size: 4rem; }

        /* UI Overlays */
        #welcome { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .btn { background: var(--fia-blue); color: white; padding: 20px 40px; border: 2px solid white; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
        #search-overlay { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; padding: 20px; }
        .s-input { width: 100%; padding: 20px; background: #111; color: white; border: 2px solid var(--fia-blue); font-size: 2rem; }
    </style>
</head>
<body>

<div class="db-navbar">
    <div class="db-logo">DB</div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" style="padding: 5px 15px; font-size: 0.9rem;" onclick="toggleFullscreen()">VOLLBILD</button>
        <button class="btn" style="padding: 5px 15px; font-size: 0.9rem;" onclick="goHome()">HOME</button>
    </div>
</div>

<div id="welcome">
    <button class="btn" onclick="openSearch()">STATION WÄHLEN</button>
</div>

<div class="fia-container">
    <div class="fia-header">
        <div class="station-name" id="display-station">...</div>
        <div class="clock" id="clock">00:00</div>
    </div>
    <div id="board"></div>
</div>

<div id="search-overlay">
    <input type="text" class="s-input" id="station-query" placeholder="Name..." oninput="filterStations()">
    <div id="search-results" style="margin-top:20px; color:white; font-size:1.5rem; overflow-y:auto; max-height:70vh;"></div>
</div>

<script>
    const STATIONS_DB = [
        { name: "Bad Belzig", file: "bad_belzig.json" }, { name: "Berlin Hbf", file: "berlin_hbf.json" },
        { name: "Biederitz", file: "biederitz.json" }, { name: "Bitterfeld", file: "bitterfeld.json" },
        { name: "Brandenburg Hbf", file: "brandenburg_hbf.json" }, { name: "Dessau Hbf", file: "dessau_hbf.json" },
        { name: "Dessau Süd", file: "dessau_sued.json" }, { name: "Gommern", file: "gommern.json" },
        { name: "Güterglück", file: "gueterglueck.json" }, { name: "Leipzig Hbf", file: "leipzig_hbf.json" },
        { name: "Leipzig Hbf (tief)", file: "leipzig_hbf_tief.json" }, { name: "Magdeburg Hbf", file: "magdeburg_hbf.json" },
        { name: "Magdeburg Herrenkrug", file: "magdeburg_herrenkrug.json" }, { name: "Magdeburg Neustadt", file: "magdeburg_neustadt.json" },
        { name: "Pretzier (Altm)", file: "pretzier_altm.json" }, { name: "Rodleben", file: "rodleben.json" },
        { name: "Roßlau (Elbe)", file: "rosslau.json" }, { name: "Wolfen", file: "wolfen.json" },
        { name: "Wusterwitz", file: "wusterwitz.json" }, { name: "Zerbst/Anhalt", file: "zerbst.json" }
    ];

    const BASE_URL = 'https://raw.githubusercontent.com/nicopro2021/Abfahrtstafel-/main/';
    let currentStation = null;

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function openSearch() { document.getElementById('search-overlay').style.display = 'block'; document.getElementById('station-query').focus(); }
    function goHome() { document.getElementById('welcome').style.display = 'flex'; }

    function selectStation(station) {
        currentStation = station;
        document.getElementById('display-station').innerText = station.name;
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('search-overlay').style.display = 'none';
        loadData();
    }

    function filterStations() {
        const q = document.getElementById('station-query').value.toLowerCase();
        document.getElementById('search-results').innerHTML = STATIONS_DB.filter(s => s.name.toLowerCase().includes(q))
            .map(s => `<div onclick='selectStation(${JSON.stringify(s)})' style="padding:15px; border-bottom:1px solid #333; cursor:pointer;">${s.name}</div>`).join('');
    }

    async function loadData() {
        if(!currentStation) return;
        try {
            const res = await fetch(`${BASE_URL}${currentStation.file}?t=${Date.now()}`);
            const data = await res.json();
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const jetzt = new Date();
            const aktuelleSek = (jetzt.getHours() * 3600) + (jetzt.getMinutes() * 60);

            data.forEach(zug => {
                const isDelayed = zug.echte_zeit !== zug.zeit;
                const [h, m] = zug.echte_zeit.split(':').map(Number);
                const zugSek = (h * 3600) + (m * 60);
                const isAboutToDepart = (zugSek - aktuelleSek) <= 180 && (zugSek - aktuelleSek) >= 0;

                board.innerHTML += `
                    <div class="departure-row">
                        ${isAboutToDepart ? '<div class="blink-dot"></div>' : ''}
                        <div class="time-box">
                            <span class="line-id">${zug.linie}</span>
                            <div class="time-wrapper">
                                <span class="plan-time">${zug.zeit}</span>
                                ${isDelayed ? `<div class="delay-box">${zug.echte_zeit}</div>` : ''}
                            </div>
                        </div>
                        <div class="dest-box">
                            <div class="via-stations">${zug.begruendung || ''}</div>
                            <div class="destination">${zug.ziel}</div>
                        </div>
                        <div class="track-box">${zug.gleis || ''}</div>
                    </div>`;
            });
        } catch (e) { console.error("Error"); }
    }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);
    setInterval(loadData, 30000);
</script>
</body>
</html>
