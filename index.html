<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DB FIA Monitor Pro</title>
    <style>
        :root {
            --fia-blue: #0000cc;
            --fia-white: #ffffff;
            --fia-delay-bg: #ffffff;
            --fia-delay-text: #0000cc;
            --db-red: #e2001a;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background: #000; font-family: Arial, sans-serif; overflow: hidden; }

        /* Header */
        .db-navbar { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--db-red); }
        .db-logo { background: var(--db-red); color: white; font-weight: bold; padding: 4px 10px; border-radius: 2px; }
        .btn { background: var(--fia-blue); color: white; border: 1px solid white; padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* Monitor */
        .fia-container { height: calc(100vh - 55px); background: var(--fia-blue); color: var(--fia-white); display: flex; flex-direction: column; }
        .fia-header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid rgba(255,255,255,0.4); }
        .station-name { font-size: 2.2rem; font-weight: bold; text-transform: uppercase; }
        .clock { font-size: 2.2rem; font-weight: bold; }

        #board { flex: 1; overflow-y: auto; }
        .departure-row { display: grid; grid-template-columns: 320px 1fr 120px; padding: 20px 30px; border-bottom: 2px solid rgba(255,255,255,0.2); position: relative; align-items: center; min-height: 140px; }

        /* Animationen */
        @keyframes delay-blink { 50% { opacity: 0.2; } }
        @keyframes depart-blink { 50% { opacity: 0; } }

        .time-box { display: flex; flex-direction: column; }
        .line-id { font-size: 1.5rem; font-weight: bold; margin-bottom: 8px; }
        .time-wrapper { display: flex; align-items: center; gap: 15px; }
        .plan-time { font-size: 3.8rem; font-weight: bold; }
        
        .delay-box { background: var(--fia-delay-bg); color: var(--fia-delay-text); padding: 4px 12px; font-size: 2rem; font-weight: bold; border-radius: 2px; animation: delay-blink 1.5s step-end infinite; }

        .dest-box { padding-left: 20px; }
        .destination { font-size: 4rem; font-weight: bold; line-height: 1.1; }

        .track-box { text-align: right; font-size: 4.5rem; font-weight: bold; }

        /* Der weiße Punkt signalisiert: "Zug fährt unmittelbar ab" (Self-Check/Türen schließen) */
        .depart-point { width: 15px; height: 15px; background: white; border-radius: 50%; position: absolute; left: 8px; top: 50%; transform: translateY(-50%); animation: depart-blink 1s infinite; }

        /* Fullscreen */
        :fullscreen .departure-row { grid-template-columns: 550px 1fr 200px; padding: 50px 60px; min-height: 250px; }
        :fullscreen .plan-time { font-size: 9rem; }
        :fullscreen .destination { font-size: 9rem; }
        :fullscreen .track-box { font-size: 11rem; }
    </style>
</head>
<body>

<div class="db-navbar">
    <div class="db-logo">DB</div>
    <div style="display: flex; gap: 15px;">
        <button class="btn" onclick="toggleFullscreen()">VOLLBILD</button>
        <button class="btn" onclick="goHome()">HOME</button>
    </div>
</div>

<div class="fia-container">
    <div class="fia-header">
        <div class="station-name" id="display-station">BITTE WÄHLEN</div>
        <div class="clock" id="clock">00:00</div>
    </div>
    <div id="board"></div>
</div>

<script>
    const BASE_URL = 'https://raw.githubusercontent.com/nicopro2021/Abfahrtstafel-/main/';
    let currentStation = { name: "Dessau Süd", file: "dessau_sued.json" }; // Beispiel-Start

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    async function loadData() {
        try {
            const res = await fetch(`${BASE_URL}${currentStation.file}?t=${Date.now()}`);
            const data = await res.json();
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const jetzt = new Date();
            const aktuelleSek = (jetzt.getHours() * 3600) + (jetzt.getMinutes() * 60) + jetzt.getSeconds();

            data.forEach(zug => {
                const [h, m] = zug.echte_zeit.split(':').map(Number);
                const [ph, pm] = zug.zeit.split(':').map(Number);
                
                const echteSek = (h * 3600) + (m * 60);
                const planSek = (ph * 3600) + (pm * 60);

                // FILTER: Züge werden erst 120 Sek nach der ECHTEN Abfahrtszeit entfernt
                // So "verschluckt" die Verspätung den Zug nicht aus der Liste
                if (echteSek < aktuelleSek - 120) return;

                const isDelayed = zug.echte_zeit !== zug.zeit;
                // Punkt signalisiert Abfahrt in den nächsten 3 Minuten (180 Sek)
                const isAboutToDepart = (echteSek - aktuelleSek) <= 180 && (echteSek - aktuelleSek) >= 0;

                board.innerHTML += `
                    <div class="departure-row">
                        ${isAboutToDepart ? '<div class="depart-point"></div>' : ''}
                        <div class="time-box">
                            <span class="line-id">${zug.linie}</span>
                            <div class="time-wrapper">
                                <span class="plan-time">${zug.zeit}</span>
                                ${isDelayed ? `<div class="delay-box">${zug.echte_zeit}</div>` : ''}
                            </div>
                        </div>
                        <div class="dest-box">
                            <div class="destination">${zug.ziel}</div>
                        </div>
                        <div class="track-box">${zug.gleis || ''}</div>
                    </div>`;
            });
        } catch (e) { console.error("Datenfehler"); }
    }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);
    setInterval(loadData, 30000);
    loadData(); // Initialer Call
</script>
</body>
</html>
