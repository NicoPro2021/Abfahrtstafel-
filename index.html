<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DB FIA Monitor | Live</title>
    <style>
        :root {
            --fia-blue: #0000cc; /* Das leuchtende Blau vom Foto */
            --fia-white: #ffffff;
            --fia-delay-bg: #ffffff;
            --fia-delay-text: #0000cc;
            --db-red: #e2001a;
        }

        * { box-sizing: border-box; }

        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #000; 
            font-family: Arial, Helvetica, sans-serif; 
            overflow: hidden; 
        }

        /* Navbar & Steuerung */
        .db-navbar {
            background: #222; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 2px solid var(--db-red);
        }
        .db-logo { background: var(--db-red); color: white; font-weight: bold; padding: 4px 10px; border-radius: 2px; }
        .nav-btn { background: #444; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }

        /* Der FIA Monitor */
        .fia-container {
            height: calc(100vh - 55px);
            background: var(--fia-blue);
            color: var(--fia-white);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header / Uhrzeit oben */
        .fia-header {
            padding: 10px 25px;
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        .station-name { font-size: 1.8rem; font-weight: bold; }
        .clock { font-size: 2.2rem; font-weight: bold; }

        /* Abfahrtszeilen */
        #board { flex: 1; overflow-y: auto; }

        .departure-row {
            display: grid;
            grid-template-columns: 180px 1fr 100px;
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            position: relative;
            align-items: center;
        }

        /* Zeit-Sektion (Links) */
        .time-box { display: flex; flex-direction: column; }
        .line-id { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        .time-wrapper { display: flex; align-items: center; gap: 10px; }
        .plan-time { font-size: 2.8rem; font-weight: bold; }
        .delay-box { 
            background: var(--fia-delay-bg); 
            color: var(--fia-delay-text); 
            padding: 2px 8px; 
            font-size: 1.6rem; 
            font-weight: bold; 
            border-radius: 2px;
        }

        /* Ziel-Sektion (Mitte) */
        .dest-box { padding-left: 20px; }
        .via-stations { font-size: 1.1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; opacity: 0.9; }
        .destination { font-size: 3rem; font-weight: bold; letter-spacing: -1px; }

        /* Gleis (Rechts) */
        .track-box { text-align: right; font-size: 3.5rem; font-weight: bold; }

        /* Blink-Punkt bei Abfahrt */
        .blink-dot {
            width: 14px; height: 14px; background: white; border-radius: 50%;
            position: absolute; left: 8px; top: 55%; transform: translateY(-50%);
            animation: fia-blink 1.2s infinite;
        }
        @keyframes fia-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }

        /* Fullscreen Skalierung */
        :fullscreen .station-name { font-size: 3.5rem; }
        :fullscreen .clock { font-size: 3.5rem; }
        :fullscreen .line-id { font-size: 2rem; }
        :fullscreen .plan-time { font-size: 5rem; }
        :fullscreen .delay-box { font-size: 3rem; }
        :fullscreen .destination { font-size: 6rem; }
        :fullscreen .track-box { font-size: 8rem; }
        :fullscreen .via-stations { font-size: 2rem; }

        /* Welcome & Search */
        #welcome-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: var(--fia-blue); color: white; padding: 25px 50px; border: none; font-size: 2rem; font-weight: bold; cursor: pointer; border: 3px solid white; }
    </style>
</head>
<body>

<div class="db-navbar">
    <div class="db-logo">DB</div>
    <div style="display: flex; gap: 10px;">
        <button class="nav-btn" onclick="toggleFullscreen()">VOLLBILD</button>
        <button class="nav-btn" onclick="location.reload()">REFRESH</button>
    </div>
</div>

<div id="welcome-overlay">
    <button class="start-btn" onclick="openSearch()">BAHNHOF WÄHLEN</button>
</div>

<div class="fia-container">
    <div class="fia-header">
        <div class="station-name" id="display-station">Bitte wählen...</div>
        <div class="clock" id="clock">00:00</div>
    </div>
    <div id="board"></div>
</div>

<div id="search-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:6000; padding:40px;">
    <input type="text" id="station-query" placeholder="Suchen..." oninput="filterStations()" style="width:100%; padding:20px; font-size:2rem; background:#111; color:white; border:2px solid var(--fia-blue);">
    <div id="search-results" style="margin-top:20px; color:white; font-size:1.5rem; overflow-y:auto; max-height:70vh;"></div>
</div>

<script>
    const STATIONS_DB = [
        { name: "Bad Belzig", file: "bad_belzig.json" }, { name: "Berlin Hbf", file: "berlin_hbf.json" },
        { name: "Biederitz", file: "biederitz.json" }, { name: "Bitterfeld", file: "bitterfeld.json" },
        { name: "Brandenburg Hbf", file: "brandenburg_hbf.json" }, { name: "Dessau Hbf", file: "dessau_hbf.json" },
        { name: "Dessau Süd", file: "dessau_sued.json" }, { name: "Gommern", file: "gommern.json" },
        { name: "Güterglück", file: "gueterglueck.json" }, { name: "Leipzig Hbf", file: "leipzig_hbf.json" },
        { name: "Leipzig Hbf (tief)", file: "leipzig_hbf_tief.json" }, { name: "Magdeburg Hbf", file: "magdeburg_hbf.json" },
        { name: "Magdeburg Herrenkrug", file: "magdeburg_herrenkrug.json" }, { name: "Magdeburg Neustadt", file: "magdeburg_neustadt.json" },
        { name: "Pretzier (Altm)", file: "pretzier_altm.json" }, { name: "Rodleben", file: "rodleben.json" },
        { name: "Roßlau (Elbe)", file: "rosslau.json" }, { name: "Wolfen", file: "wolfen.json" },
        { name: "Wusterwitz", file: "wusterwitz.json" }, { name: "Zerbst/Anhalt", file: "zerbst.json" }
    ];

    const BASE_URL = 'https://raw.githubusercontent.com/nicopro2021/Abfahrtstafel-/main/';
    let currentStation = null;

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function openSearch() { document.getElementById('search-overlay').style.display = 'block'; document.getElementById('station-query').focus(); }
    
    function selectStation(station) {
        currentStation = station;
        document.getElementById('display-station').innerText = station.name.toUpperCase();
        document.getElementById('welcome-overlay').style.display = 'none';
        document.getElementById('search-overlay').style.display = 'none';
        loadData();
    }

    function filterStations() {
        const q = document.getElementById('station-query').value.toLowerCase();
        document.getElementById('search-results').innerHTML = STATIONS_DB.filter(s => s.name.toLowerCase().includes(q))
            .map(s => `<div onclick='selectStation(${JSON.stringify(s)})' style="padding:15px; border-bottom:1px solid #333; cursor:pointer;">${s.name}</div>`).join('');
    }

    async function loadData() {
        if(!currentStation) return;
        try {
            const res = await fetch(`${BASE_URL}${currentStation.file}?t=${Date.now()}`);
            const data = await res.json();
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const jetzt = new Date();
            const aktuelleSekunden = (jetzt.getHours() * 3600) + (jetzt.getMinutes() * 60);

            data.forEach(zug => {
                const isDelayed = zug.echte_zeit !== zug.zeit;
                const [h, m] = zug.echte_zeit.split(':').map(Number);
                const zugSek = (h * 3600) + (m * 60);
                const isAboutToDepart = (zugSek - aktuelleSekunden) <= 180 && (zugSek - aktuelleSekunden) >= 0;

                board.innerHTML += `
                    <div class="departure-row">
                        ${isAboutToDepart ? '<div class="blink-dot"></div>' : ''}
                        <div class="time-box">
                            <span class="line-id">${zug.linie}</span>
                            <div class="time-wrapper">
                                <span class="plan-time">${zug.zeit}</span>
                                ${isDelayed ? `<div class="delay-box">${zug.echte_zeit}</div>` : ''}
                            </div>
                        </div>
                        <div class="dest-box">
                            <div class="via-stations">${zug.begruendung || 'Siegburg/Bonn - Frankfurt(M) Hbf - Mannheim Hbf'}</div>
                            <div class="destination">${zug.ziel}</div>
                        </div>
                        <div class="track-box">${zug.gleis || ''}</div>
                    </div>`;
            });
        } catch (e) { console.error("Datenfehler"); }
    }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);
    setInterval(loadData, 30000);
</script>
</body>
</html>
