<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DB Abfahrtstafel | Live</title>
    <style>
        :root {
            --db-red: #e2001a;
            --db-blue-dark: #000066; /* Typisches DB-Blau für Monitore */
            --db-gray-bg: #f0f0f0;
            --db-border: #dcdcdc;
            --text-main: #000000;
            --ontime-green: #008754;
            --delay-red: #d50000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #ffffff; 
            font-family: Arial, Helvetica, sans-serif; /* DB nutzt ähnliche Grotesk-Schriften */
            overflow: hidden; 
            color: var(--text-main);
        }

        /* Navbar im DB-Stil */
        .db-navbar {
            background: #ffffff;
            padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 4px solid var(--db-red);
            position: sticky; top: 0; z-index: 1000;
        }

        .db-logo { 
            background: var(--db-red); color: white; 
            font-weight: bold; padding: 5px 12px; 
            border-radius: 2px; font-size: 1.4rem;
        }

        .fs-toggle {
            background: var(--db-blue-dark); color: white; border: none;
            padding: 8px 15px; border-radius: 0; font-size: 0.8rem;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Monitor Ansicht - RIS Design */
        .monitor { display: none; flex-direction: column; height: 100%; }
        .monitor.active { display: flex; }

        .station-header { 
            padding: 15px 25px; 
            background: var(--db-blue-dark); 
            color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .station-name { font-size: 2.2rem; font-weight: bold; margin: 0; letter-spacing: -0.5px; }

        #clock { font-size: 1.8rem; font-weight: bold; font-variant-numeric: tabular-nums; }

        /* Abfahrtstafel Header */
        .board-header {
            display: grid;
            grid-template-columns: 120px 1fr 100px;
            padding: 10px 25px;
            background: #eeeeee;
            border-bottom: 2px solid var(--db-border);
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
        }

        #board { flex: 1; overflow-y: auto; background: white; }

        .departure-row { 
            display: grid; 
            grid-template-columns: 120px 1fr 100px; 
            padding: 20px 25px; 
            border-bottom: 1px solid var(--db-border); 
            align-items: center;
        }

        /* Zeit-Spalte */
        .time-col { 
            border-right: 2px solid var(--db-border);
            padding-right: 15px;
        }
        .p-time { font-size: 1.8rem; font-weight: bold; }
        .actual-time { color: var(--delay-red); font-size: 1.8rem; font-weight: bold; }
        .status-info { font-size: 0.85rem; font-weight: bold; margin-top: 2px; }

        /* Zug-Spalte */
        .train-col { 
            padding: 0 25px; 
            display: flex;
            flex-direction: column;
        }
        .train-id { font-size: 1rem; font-weight: bold; color: var(--db-red); margin-bottom: 4px; }
        .train-dest { font-size: 1.8rem; font-weight: bold; color: var(--db-blue-dark); }

        /* Gleis-Spalte */
        .gl-col { 
            border-left: 2px solid var(--db-border);
            text-align: center;
            padding-left: 15px;
        }
        .pl-label { font-size: 0.8rem; font-weight: bold; display: block; color: #666; }
        .pl-value { font-size: 2.5rem; font-weight: bold; color: var(--db-blue-dark); }

        /* FULLSCREEN MODUS */
        :fullscreen .station-header { padding: 30px 50px; }
        :fullscreen .station-name { font-size: 4.5rem; }
        :fullscreen #clock { font-size: 3.5rem; }
        
        :fullscreen .board-header { font-size: 1.5rem; padding: 20px 50px; grid-template-columns: 300px 1fr 200px; }
        
        :fullscreen .departure-row { 
            padding: 50px 50px; 
            grid-template-columns: 300px 1fr 200px; 
            gap: 20px;
        }

        :fullscreen .p-time, :fullscreen .actual-time { font-size: 5rem; }
        :fullscreen .train-id { font-size: 2.2rem; }
        :fullscreen .train-dest { font-size: 5rem; }
        :fullscreen .pl-value { font-size: 8rem; }
        :fullscreen .status-info { font-size: 1.5rem; }

        /* Welcome & Search - schlichter Look */
        #welcome-screen { position: fixed; inset: 0; background: var(--db-gray-bg); z-index: 3000; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        #welcome-screen.hidden { display: none; }
        .search-box { background: white; width: 100%; max-width: 600px; padding: 20px; border: 2px solid var(--db-red); font-size: 1.2rem; cursor: pointer; font-weight: bold; text-align: center; }
        .fav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; margin-top: 20px; }
        .fav-item { background: white; padding: 20px; border: 1px solid var(--db-border); font-weight: bold; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="db-navbar">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="db-logo">DB</div>
        <button class="fs-toggle" onclick="toggleFullscreen()">Vollbild</button>
    </div>
    <div id="status-text" style="font-weight: bold; color: var(--ontime-green);">● LIVE</div>
    <div id="weather-small" style="font-weight: bold;">--°C</div>
</div>

<div id="welcome-screen">
    <div style="font-size: 2rem; font-weight: bold; margin-bottom: 30px; color: var(--db-blue-dark);">Abfahrtstafel</div>
    <div class="search-box" onclick="openSearch()">Station wählen ...</div>
    <div class="fav-grid" id="fav-bar"></div>
</div>

<div class="monitor" id="monitor-app">
    <div class="station-header">
        <h1 id="display-station" class="station-name">Bahnhof</h1>
        <div id="clock">00:00</div>
    </div>
    <div class="board-header">
        <div>Zeit</div>
        <div>Fahrt / Ziel</div>
        <div style="text-align: center;">Gleis</div>
    </div>
    <div id="board"></div>
    <button onclick="goHome()" style="position:fixed; bottom:20px; right:20px; padding:15px; background:var(--db-red); color:white; border:none; font-weight:bold; cursor:pointer;">Zurück</button>
</div>

<div id="search-overlay" style="display:none; position:fixed; inset:0; background:white; z-index:4000; padding:20px;">
    <input type="text" id="station-query" placeholder="Suchen..." oninput="filterStations()" style="width:100%; padding:20px; font-size:1.5rem; border:2px solid var(--db-red); outline:none;">
    <div id="search-results" style="margin-top:20px; overflow-y:auto; max-height:80vh;"></div>
    <button onclick="closeSearch()" style="margin-top:20px; width:100%; padding:15px; background:var(--db-blue-dark); color:white; border:none; font-weight:bold;">Schließen</button>
</div>

<script>
    const STATIONS_DB = [
        { name: "Bad Belzig", file: "bad_belzig.json" }, { name: "Berlin Hbf", file: "berlin_hbf.json" },
        { name: "Biederitz", file: "biederitz.json" }, { name: "Bitterfeld", file: "bitterfeld.json" },
        { name: "Brandenburg Hbf", file: "brandenburg_hbf.json" }, { name: "Dessau Hbf", file: "dessau_hbf.json" },
        { name: "Dessau Süd", file: "dessau_sued.json" }, { name: "Gommern", file: "gommern.json" },
        { name: "Güterglück", file: "gueterglueck.json" }, { name: "Leipzig Hbf", file: "leipzig_hbf.json" },
        { name: "Leipzig Hbf (tief)", file: "leipzig_hbf_tief.json" }, { name: "Magdeburg Hbf", file: "magdeburg_hbf.json" },
        { name: "Magdeburg Herrenkrug", file: "magdeburg_herrenkrug.json" }, { name: "Magdeburg Neustadt", file: "magdeburg_neustadt.json" },
        { name: "Pretzier (Altm)", file: "pretzier_altm.json" }, { name: "Rodleben", file: "rodleben.json" },
        { name: "Roßlau (Elbe)", file: "rosslau.json" }, { name: "Wolfen", file: "wolfen.json" },
        { name: "Wusterwitz", file: "wusterwitz.json" }, { name: "Zerbst/Anhalt", file: "zerbst.json" }
    ];

    const BASE_URL = 'https://raw.githubusercontent.com/nicopro2021/Abfahrtstafel-/main/';
    let currentStation = null;
    let favorites = JSON.parse(localStorage.getItem('db_monitor_favs')) || [null, null, null, null];

    function toggleFullscreen() {
        const doc = document.documentElement;
        if (!document.fullscreenElement) {
            if (doc.requestFullscreen) doc.requestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    function openSearch() { document.getElementById('search-overlay').style.display = 'block'; document.getElementById('station-query').focus(); filterStations(); }
    function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; }
    function goHome() { document.getElementById('welcome-screen').classList.remove('hidden'); document.getElementById('monitor-app').classList.remove('active'); }

    function selectStation(station) {
        currentStation = station;
        document.getElementById('display-station').innerText = station.name;
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('monitor-app').classList.add('active');
        closeSearch(); loadData();
    }

    function filterStations() {
        const q = document.getElementById('station-query').value.toLowerCase();
        document.getElementById('search-results').innerHTML = STATIONS_DB.filter(s => s.name.toLowerCase().includes(q))
            .map(s => `<div onclick='selectStation(${JSON.stringify(s)})' style="padding:15px; border-bottom:1px solid #ddd; font-weight:bold; cursor:pointer;">${s.name}</div>`).join('');
    }

    async function loadData() {
        if(!currentStation) return;
        try {
            const res = await fetch(`${BASE_URL}${currentStation.file}?t=${Date.now()}`);
            const data = await res.json();
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            data.forEach(zug => {
                const isDelayed = zug.echte_zeit !== zug.zeit;
                board.innerHTML += `
                    <div class="departure-row">
                        <div class="time-col">
                            <div class="${isDelayed ? 'actual-time' : 'p-time'}">${zug.echte_zeit}</div>
                            <div class="status-info" style="color:${isDelayed ? 'var(--delay-red)' : 'var(--ontime-green)'}">
                                ${isDelayed ? 'Statt '+zug.zeit : 'pünktlich'}
                            </div>
                        </div>
                        <div class="train-col">
                            <span class="train-id">${zug.linie}</span>
                            <span class="train-dest">${zug.ziel}</span>
                        </div>
                        <div class="gl-col">
                            <span class="pl-label">Gleis</span>
                            <span class="pl-value">${zug.gleis || '—'}</span>
                        </div>
                    </div>`;
            });
        } catch (e) { console.error("Fehler beim Laden"); }
    }

    function updateFavUI() {
        document.getElementById('fav-bar').innerHTML = favorites.map((f, i) => `
            <div class="fav-item" onclick="fClick(${i})">${f ? f.name : 'Platz '+(i+1)}</div>`).join('');
    }
    function fClick(i) { if(favorites[i]) selectStation(favorites[i]); else openSearch(); }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);

    setInterval(loadData, 30000);
    updateFavUI();
</script>
</body>
</html>
